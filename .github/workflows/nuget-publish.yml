name: Publish NuGet Package

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: "5.x"

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1

      - name: Restore
        run: dotnet restore VirusScanner.slnx

      - name: Build
        run: dotnet build VirusScanner.slnx --no-restore -c Release -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Test
        run: dotnet test VirusScanner.slnx --no-build -c Release --filter "Category!=Integration"

      - name: Pack VirusScanner.Core
        run: dotnet pack VirusScanner.Core/VirusScanner.Core.csproj --no-build -c Release -p:Version=${{ steps.gitversion.outputs.semVer }} --output ./nupkgs

      - name: Pack VirusScanner.ClamAV
        run: dotnet pack VirusScanner.ClamAV/VirusScanner.ClamAV.csproj --no-build -c Release -p:Version=${{ steps.gitversion.outputs.semVer }} --output ./nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          name: v${{ steps.gitversion.outputs.semVer }}
          generate_release_notes: true
          files: ./nupkgs/*.nupkg
          token: ${{ secrets.GITHUB_TOKEN }}
